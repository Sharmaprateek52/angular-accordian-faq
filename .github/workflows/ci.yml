name: Angular CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main
jobs:
  test-build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run prettier check
        run: npm run format:check

      - name: Run lint
        run: npm run lint

      - name: Run unit tests
        run: npm run test

      - name: Build Angular app
        run: npm run build
